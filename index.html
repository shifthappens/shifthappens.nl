<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shifthappens</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background-color: #f7f7f5;
      font-family: system-ui, -apple-system, sans-serif;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      text-align: center;
    }

    .logo img {
      width: min(420px, 80vw);
      height: auto;
    }

    p {
      color: #888;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
    }

    @media (prefers-color-scheme: dark) {
      body { background-color: #150F09; }
      p { color: #A08060; }
    }

  </style>
</head>
<body>
  <main>
    <div class="logo">
      <img src="images/logo550.png" alt="shifthappens" width="550" height="111">
    </div>
    <p>interactieve webapplicaties</p>
  </main>
</body>
</html>
